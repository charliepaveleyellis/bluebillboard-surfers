<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blue Billboard - Street Surfer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;background:#000;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(0,20,50,0.92);color:#fff;text-align:center;padding:24px;}
.overlay.hidden{display:none;}
.overlay .logo-img{width:160px;margin-bottom:20px;}
.overlay h1{font-size:28px;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;color:#2ea3f2;}
.overlay h2{font-size:15px;font-weight:400;margin-bottom:20px;color:#d9d9d9;line-height:1.5;}
.overlay .final-score{font-size:64px;font-weight:900;color:#297ff0;margin:8px 0;}
.overlay .final-label{font-size:13px;color:#d9d9d9;text-transform:uppercase;letter-spacing:2px;}
.overlay .stats{font-size:12px;color:#2ea3f2;margin-top:4px;}
.overlay .high{font-size:13px;color:#ffc107;margin-top:4px;}
.btn{display:inline-block;padding:14px 44px;font-size:16px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:#fff;background:#003d7a;
  border:none;border-radius:50px;cursor:pointer;margin-top:20px;}
.btn:active{background:#297ff0;}
.powered-by{position:fixed;bottom:4px;left:0;right:0;text-align:center;
  font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1px;
  text-transform:uppercase;z-index:3;pointer-events:none;}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="overlay" id="startScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1>Street Surfer</h1>
  <h2>Swipe left/right to switch lanes<br>Swipe up to jump, down to slide<br>Collect coins and dodge obstacles!</h2>
  <button class="btn" id="startBtn">Run!</button>
</div>

<div class="overlay hidden" id="endScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1>Busted!</h1>
  <div class="final-label">Score</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="high" id="highDisp"></div>
  <div class="stats" id="statsDisp"></div>
  <button class="btn" id="restartBtn">Run Again!</button>
</div>

<div class="powered-by">Powered by Blue Billboard</div>

<script>
// ─── AUDIO ────────────────────────────────────────
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function snd(f,t,d,v){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.06;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(d||0.1));
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+(d||0.1));}catch(e){}}
function sfxCoin(){snd(1200,'sine',0.08,0.07);snd(1600,'sine',0.06,0.05);}
function sfxJump(){snd(300,'sine',0.15,0.06);}
function sfxSlide(){snd(150,'sawtooth',0.1,0.04);}
function sfxCrash(){snd(80,'sawtooth',0.3,0.1);snd(120,'square',0.2,0.08);}
function sfxSwitch(){snd(500,'sine',0.05,0.04);}

// ─── CANVAS ───────────────────────────────────────
var C=document.getElementById('game');
var X=C.getContext('2d');
function resize(){C.width=window.innerWidth;C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ─── GAME CONFIG ──────────────────────────────────
var LANES=[-1,0,1]; // left, center, right
var LANE_W=110;      // lane width at bottom
var BASE_SPEED=4;
var MAX_SPEED=20;
var GRAVITY=0.8;
var JUMP_FORCE=-14;
var GROUND_Y_PCT=0.78; // ground line as % of canvas height

// Perspective
var VP_Y;     // vanishing point Y
var VP_X;     // vanishing point X
var ROAD_TOP; // where road starts (near VP)
var ROAD_BOT; // where road ends (bottom)

function setupPerspective(){
  VP_X=C.width/2;
  VP_Y=C.height*0.28;
  ROAD_TOP=VP_Y+20;
  ROAD_BOT=C.height*GROUND_Y_PCT;
}

// Map a z-depth (0=near, 1=far) to screen Y
function zToY(z){ return ROAD_BOT-(ROAD_BOT-ROAD_TOP)*z; }
// Scale at a given z — gentler falloff so objects visible from further away
function scaleAt(z){ return Math.max(0,1-z*0.55); }
// Lane X position at a given z — proper perspective so objects travel in straight screen lines
function laneX(lane,z){
  // Use perspective division: at z=0 full width, converges to VP_X at infinity
  var p=1/(1+z*3);
  return VP_X+lane*LANE_W*p;
}

// ─── STATE ────────────────────────────────────────
var running=false,gameOver=false;
var score=0,coins=0,distance=0;
var highScore=parseInt(localStorage.getItem('bb_surfer_hi')||'0');
var speed=BASE_SPEED;
var frameCount=0;

// Player
var player={lane:0,targetLane:0,laneX:0,y:0,vy:0,jumping:false,sliding:false,slideTimer:0,
  switchAnim:0,invincible:0};

// Obstacles & coins
var obstacles=[];
var coinItems=[];
var particles=[];
var lastSpawnDist=0;
var SPAWN_GAP=25;
var camZ=0; // camera world position — moves forward as player runs

// Swipe
var swipeX=0,swipeY=0,swiping=false;

// ─── ELEMENTS ─────────────────────────────────────
var startScreen=document.getElementById('startScreen');
var endScreen=document.getElementById('endScreen');

// ─── OBSTACLE TYPES ──────────────────────────────
// type: 'billboard' (jump over), 'barrier' (slide under), 'van' (full block - switch lane)
function spawnRow(){
  // Difficulty scales with distance
  var diff=Math.min(distance/500,1); // 0 to 1 over 500m

  var r=Math.random();

  if(r<0.25-diff*0.1){
    // Single obstacle in random lane (easier — less common later)
    var lane=LANES[Math.floor(Math.random()*3)];
    var type=Math.random()<0.5?'billboard':'barrier';
    obstacles.push({lane:lane,wz:camZ+1.6,type:type,hit:false});
  } else if(r<0.45){
    // Van blocks one lane
    var lane=LANES[Math.floor(Math.random()*3)];
    obstacles.push({lane:lane,wz:camZ+1.6,type:'van',hit:false});
  } else if(r<0.65+diff*0.1){
    // Two obstacles, different lanes (more common later)
    var lanes=[0,1,2];
    var l1=lanes.splice(Math.floor(Math.random()*3),1)[0];
    var l2=lanes[Math.floor(Math.random()*2)];
    obstacles.push({lane:LANES[l1],z:1.1,type:Math.random()<0.5?'billboard':'van',hit:false});
    obstacles.push({lane:LANES[l2],wz:camZ+1.62,type:Math.random()<0.5?'barrier':'billboard',hit:false});
  } else if(r<0.75+diff*0.15){
    // Two vans — only one lane free (hard — more common with distance)
    var freeLane=Math.floor(Math.random()*3);
    for(var i=0;i<3;i++){
      if(i!==freeLane) obstacles.push({lane:LANES[i],wz:camZ+1.6,type:'van',hit:false});
    }
  } else if(r<0.8+diff*0.05){
    // Jump-slide combo: billboard in one lane, barrier in another
    var lanes=[0,1,2];
    var l1=lanes.splice(Math.floor(Math.random()*3),1)[0];
    var l2=lanes[Math.floor(Math.random()*2)];
    obstacles.push({lane:LANES[l1],wz:camZ+1.6,type:'billboard',hit:false});
    obstacles.push({lane:LANES[l2],wz:camZ+1.6,type:'barrier',hit:false});
    // Third lane gets a coin reward
    var l3;
    for(var i=0;i<3;i++){if(i!==l1&&i!==l2){l3=i;break;}}
    coinItems.push({lane:LANES[l3],wz:camZ+1.6,collected:false});
  } else {
    // Coin row
    var lane=LANES[Math.floor(Math.random()*3)];
    for(var i=0;i<5;i++){
      coinItems.push({lane:lane,wz:camZ+1.6+i*0.04,collected:false});
    }
  }
}

// ─── INPUT ────────────────────────────────────────
function onStart(x,y){swiping=true;swipeX=x;swipeY=y;}
function onEnd(x,y){
  if(!swiping)return;swiping=false;
  var dx=x-swipeX,dy=y-swipeY;
  var adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<15&&ady<15)return; // too small

  if(adx>ady){
    // Horizontal swipe
    if(dx<-25) moveLeft();
    else if(dx>25) moveRight();
  } else {
    // Vertical swipe
    if(dy<-25) jump();
    else if(dy>25) slide();
  }
}

C.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];onStart(t.clientX,t.clientY);},{passive:false});
C.addEventListener('touchend',function(e){e.preventDefault();var t=e.changedTouches[0];onEnd(t.clientX,t.clientY);},{passive:false});
C.addEventListener('mousedown',function(e){onStart(e.clientX,e.clientY);});
C.addEventListener('mouseup',function(e){onEnd(e.clientX,e.clientY);});
document.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA') moveLeft();
  if(e.code==='ArrowRight'||e.code==='KeyD') moveRight();
  if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space') jump();
  if(e.code==='ArrowDown'||e.code==='KeyS') slide();
});

function moveLeft(){
  if(player.targetLane>-1){player.targetLane--;player.switchAnim=8;sfxSwitch();}
}
function moveRight(){
  if(player.targetLane<1){player.targetLane++;player.switchAnim=8;sfxSwitch();}
}
function jump(){
  if(!player.jumping&&!player.sliding){
    player.vy=JUMP_FORCE;player.jumping=true;sfxJump();
  }
}
function slide(){
  if(!player.jumping&&!player.sliding){
    player.sliding=true;player.slideTimer=25;sfxSlide();
  }
}

// ─── DRAW ─────────────────────────────────────────

function drawSky(){
  var grad=X.createLinearGradient(0,0,0,C.height*0.5);
  grad.addColorStop(0,'#000d1a');
  grad.addColorStop(1,'#003d7a');
  X.fillStyle=grad;
  X.fillRect(0,0,C.width,C.height*0.5);

  // City skyline silhouette
  X.fillStyle='#001529';
  var skyY=VP_Y-10;
  var bw=C.width/15;
  for(var i=0;i<16;i++){
    var bh=20+((i*7+3)%5)*15+((i*13)%4)*10;
    X.fillRect(i*bw-2,skyY-bh,bw-4,bh+10);
    // Windows
    X.fillStyle='rgba(42,163,242,0.15)';
    for(var wy=skyY-bh+5;wy<skyY;wy+=8){
      for(var wx=i*bw+2;wx<(i+1)*bw-6;wx+=7){
        if(Math.random()>0.4) X.fillRect(wx,wy,3,4);
      }
    }
    X.fillStyle='#001529';
  }
}

function drawRoad(){
  setupPerspective();

  // Road surface
  X.fillStyle='#1a1a2e';
  X.beginPath();
  X.moveTo(VP_X-5,ROAD_TOP);
  X.lineTo(0,ROAD_BOT+60);
  X.lineTo(C.width,ROAD_BOT+60);
  X.lineTo(VP_X+5,ROAD_TOP);
  X.closePath();
  X.fill();

  // Road surface gradient
  var roadGrad=X.createLinearGradient(0,ROAD_TOP,0,ROAD_BOT);
  roadGrad.addColorStop(0,'rgba(0,61,122,0.1)');
  roadGrad.addColorStop(1,'rgba(0,61,122,0.3)');
  X.fillStyle=roadGrad;
  X.fill();

  // Lane lines
  var lineScroll=(frameCount*speed*2)%40;
  for(var z=0;z<1;z+=0.02){
    var y=zToY(z);
    var s=scaleAt(z);
    var segZ=((z*500+lineScroll)%40)/40;
    if(segZ>0.5) continue; // dashed

    var w=2*s;
    // Left lane line
    var lx1=laneX(-0.5,z);
    X.fillStyle='rgba(255,255,255,'+(0.15*s)+')';
    X.fillRect(lx1-w/2,y,w,2);
    // Right lane line
    var lx2=laneX(0.5,z);
    X.fillRect(lx2-w/2,y,w,2);
  }

  // Road edges (glowing)
  for(var z=0;z<1;z+=0.01){
    var y=zToY(z);
    var s=scaleAt(z);
    var lxL=laneX(-1.5,z)-10*s;
    var lxR=laneX(1.5,z)+10*s;
    X.fillStyle='rgba(42,163,242,'+(0.3*s)+')';
    X.fillRect(lxL,y,3*s,2);
    X.fillRect(lxR,y,3*s,2);
  }

  // Ground beyond road
  X.fillStyle='#0a0a1a';
  X.fillRect(0,ROAD_BOT,C.width,C.height-ROAD_BOT);
}

function drawObstacle(o){
  if(o.z===undefined||!isFinite(o.z)||o.z>1.8) return;
  var y=zToY(o.z);
  var s=scaleAt(o.z);
  if(s<=0.05) return;
  s=Math.max(s,0.15); // minimum draw scale so distant obstacles are still visible
  var ox=laneX(o.lane,o.z);

  if(o.type==='billboard'){
    // Low billboard sign — jump over
    var w=40*s,h=30*s;
    // Poles
    X.fillStyle='rgba(150,150,150,'+s+')';
    X.fillRect(ox-w/2+4,y-h,3*s,h);
    X.fillRect(ox+w/2-7*s,y-h,3*s,h);
    // Sign
    X.fillStyle='rgba(0,61,122,'+s+')';
    X.fillRect(ox-w/2,y-h,w,h*0.6);
    // Text
    X.fillStyle='rgba(255,255,255,'+s*0.8+')';
    X.font='bold '+Math.max(6,8*s)+'px Arial';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('BB',ox,y-h+h*0.3);
    // Border
    X.strokeStyle='rgba(42,163,242,'+s*0.5+')';
    X.lineWidth=1*s;
    X.strokeRect(ox-w/2,y-h,w,h*0.6);
  }
  else if(o.type==='barrier'){
    // Overhead barrier — slide under
    var w=50*s,h=35*s;
    // Poles
    X.fillStyle='rgba(150,150,150,'+s+')';
    X.fillRect(ox-w/2,y-h*1.5,3*s,h*1.5);
    X.fillRect(ox+w/2-3*s,y-h*1.5,3*s,h*1.5);
    // Bar
    X.fillStyle='rgba(255,90,77,'+s+')';
    X.fillRect(ox-w/2,y-h*1.5,w,8*s);
    // Stripes
    X.fillStyle='rgba(255,255,255,'+s*0.3+')';
    for(var sx=ox-w/2;sx<ox+w/2;sx+=10*s){
      X.fillRect(sx,y-h*1.5,4*s,8*s);
    }
  }
  else if(o.type==='van'){
    // Blue Billboard van — must dodge
    var w=45*s,h=40*s;
    // Shadow
    X.fillStyle='rgba(0,0,0,'+s*0.3+')';
    X.beginPath();
    X.ellipse(ox,y+2,w/2,6*s,0,0,Math.PI*2);
    X.fill();
    // Body
    var vanGrad=X.createLinearGradient(ox-w/2,y-h,ox+w/2,y);
    vanGrad.addColorStop(0,'rgba(0,80,160,'+s+')');
    vanGrad.addColorStop(1,'rgba(0,40,80,'+s+')');
    X.fillStyle=vanGrad;
    X.fillRect(ox-w/2,y-h,w,h);
    // Roof
    X.fillStyle='rgba(0,61,122,'+s+')';
    X.fillRect(ox-w/2+3*s,y-h-8*s,w-6*s,10*s);
    // Windshield
    X.fillStyle='rgba(100,200,255,'+s*0.4+')';
    X.fillRect(ox-w/4,y-h+4*s,w/2,h*0.3);
    // BB logo
    X.fillStyle='rgba(255,255,255,'+s*0.7+')';
    X.font='bold '+Math.max(5,7*s)+'px Arial';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('BLUE',ox,y-h*0.35);
    // Wheels
    X.fillStyle='rgba(30,30,30,'+s+')';
    X.beginPath();X.arc(ox-w/3,y,5*s,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(ox+w/3,y,5*s,0,Math.PI*2);X.fill();
  }
}

function drawCoin(c){
  if(c.z===undefined||!isFinite(c.z)||c.z>1.8) return;
  var y=zToY(c.z);
  var s=scaleAt(c.z);
  if(s<=0) return;
  var cx=laneX(c.lane,c.z);
  var r=6*s;
  var bob=Math.sin(frameCount*0.1+c.z*20)*3*s;

  // Glow
  X.shadowColor='#ffc107';X.shadowBlur=8*s;
  X.fillStyle='rgba(255,193,7,'+s+')';
  X.beginPath();X.arc(cx,y-20*s+bob,r,0,Math.PI*2);X.fill();
  X.shadowBlur=0;

  // Inner
  X.fillStyle='rgba(255,220,80,'+s+')';
  X.beginPath();X.arc(cx,y-20*s+bob,r*0.65,0,Math.PI*2);X.fill();

  // BB text
  X.fillStyle='rgba(180,120,0,'+s+')';
  X.font='bold '+Math.max(4,5*s)+'px Arial';
  X.textAlign='center';X.textBaseline='middle';
  X.fillText('B',cx,y-20*s+bob);
}

function drawPlayer(){
  var z=0.15; // player depth
  var y=zToY(z);
  var s=scaleAt(z);
  var px=laneX(player.lane,z);

  // Smooth lane switching
  if(player.switchAnim>0){
    player.switchAnim--;
    var targetX=laneX(player.targetLane,z);
    player.laneX+=(targetX-player.laneX)*0.3;
    if(player.switchAnim<=0) player.lane=player.targetLane;
  } else {
    player.laneX=laneX(player.lane,z);
  }
  px=player.laneX;

  var jumpOffset=player.y;
  var ph=50*s; // player height
  var pw=28*s;
  var py=y+jumpOffset;

  // Shadow
  var shadowScale=1-Math.abs(jumpOffset)/100;
  if(shadowScale>0){
    X.fillStyle='rgba(0,0,0,'+0.3*shadowScale+')';
    X.beginPath();X.ellipse(px,y+2,pw*0.6*shadowScale,4*shadowScale,0,0,Math.PI*2);X.fill();
  }

  // Invincible flash
  if(player.invincible>0&&frameCount%6<3) return;

  X.save();
  if(player.sliding){
    // Sliding — squash the player
    X.translate(px,py);
    X.scale(1.3,0.4);
    X.translate(-px,-py);
    ph*=0.4;
  }

  // Body
  var bodyGrad=X.createLinearGradient(px-pw/2,py-ph,px+pw/2,py);
  bodyGrad.addColorStop(0,'#297ff0');
  bodyGrad.addColorStop(1,'#003d7a');
  X.fillStyle=bodyGrad;

  // Rounded rect body
  var bx=px-pw/2,by=py-ph,bw=pw,bh=ph;
  var br=6*s;
  X.beginPath();
  X.moveTo(bx+br,by);X.lineTo(bx+bw-br,by);
  X.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
  X.lineTo(bx+bw,by+bh-br);
  X.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
  X.lineTo(bx+br,by+bh);
  X.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
  X.lineTo(bx,by+br);
  X.quadraticCurveTo(bx,by,bx+br,by);
  X.closePath();X.fill();

  // Shine
  X.fillStyle='rgba(255,255,255,0.15)';
  X.fillRect(bx+2,by+2,bw*0.4,bh*0.3);

  // Border
  X.strokeStyle='#2ea3f2';X.lineWidth=2*s;X.stroke();

  // Face
  if(!player.sliding){
    // Eyes
    var eyeY=by+ph*0.3;
    X.fillStyle='#fff';
    X.beginPath();
    X.arc(px-pw*0.2,eyeY,4*s,0,Math.PI*2);
    X.arc(px+pw*0.2,eyeY,4*s,0,Math.PI*2);
    X.fill();
    X.fillStyle='#001a33';
    X.beginPath();
    X.arc(px-pw*0.15,eyeY,2*s,0,Math.PI*2);
    X.arc(px+pw*0.25,eyeY,2*s,0,Math.PI*2);
    X.fill();

    // Mouth
    if(player.jumping){
      X.fillStyle='#fff';
      X.beginPath();X.arc(px,by+ph*0.55,3*s,0,Math.PI*2);X.fill();
    } else {
      X.strokeStyle='#fff';X.lineWidth=1.5*s;
      X.beginPath();X.arc(px,by+ph*0.5,5*s,0.1*Math.PI,0.9*Math.PI);X.stroke();
    }
  }

  // Legs (running animation)
  if(!player.sliding){
    var legAnim=Math.sin(frameCount*0.4)*5*s;
    X.strokeStyle='#2ea3f2';X.lineWidth=3*s;X.lineCap='round';
    X.beginPath();X.moveTo(px-5*s,py);X.lineTo(px-5*s+legAnim,py+10*s);X.stroke();
    X.beginPath();X.moveTo(px+5*s,py);X.lineTo(px+5*s-legAnim,py+10*s);X.stroke();
  }

  // Arms
  if(!player.sliding){
    var armAnim=Math.sin(frameCount*0.4+Math.PI)*4*s;
    X.strokeStyle='#297ff0';X.lineWidth=2.5*s;
    X.beginPath();X.moveTo(px-pw/2,by+ph*0.4);X.lineTo(px-pw/2-8*s,by+ph*0.5+armAnim);X.stroke();
    X.beginPath();X.moveTo(px+pw/2,by+ph*0.4);X.lineTo(px+pw/2+8*s,by+ph*0.5-armAnim);X.stroke();
  }

  X.restore();
}

function drawHUD(){
  // Top bar
  X.fillStyle='rgba(0,15,40,0.6)';
  X.fillRect(0,0,C.width,55);

  // Score
  X.fillStyle='#fff';
  X.font='bold 22px Arial';X.textAlign='center';
  X.fillText(Math.floor(score),C.width/2,35);

  // Coins
  X.fillStyle='#ffc107';
  X.font='bold 16px Arial';X.textAlign='left';
  X.fillText('B '+coins,16,35);

  // Distance
  X.fillStyle='#2ea3f2';
  X.font='12px Arial';X.textAlign='right';
  X.fillText(Math.floor(distance)+'m',C.width-16,35);
}

function drawParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2;
    particles.push({x:x,y:y,vx:Math.cos(a)*(2+Math.random()*3),
      vy:Math.sin(a)*(2+Math.random()*3)-2,
      life:15+Math.random()*10,maxLife:25,size:2+Math.random()*2,color:color});
  }
}

// ─── COLLISION ────────────────────────────────────
function checkCollisions(){
  // Only collide when obstacle is right at the player (z near 0, not 0.15)
  var pLane=player.lane; // use ACTUAL lane, not target

  var playerZ=0.15;
  for(var i=0;i<obstacles.length;i++){
    var o=obstacles[i];
    if(o.hit) continue;
    // Tight collision zone around player z position
    if(o.z>playerZ+0.04||o.z<playerZ-0.06) continue;
    if(o.lane!==pLane) continue;

    if(o.type==='billboard'){
      if(player.jumping&&player.y<-20) continue;
      o.hit=true; crash(); return;
    }
    else if(o.type==='barrier'){
      if(player.sliding) continue;
      o.hit=true; crash(); return;
    }
    else if(o.type==='van'){
      if(player.jumping&&player.y<-20) continue;
      if(player.invincible>0) continue;
      o.hit=true; crash(); return;
    }
  }

  for(var i=0;i<coinItems.length;i++){
    var c=coinItems[i];
    if(c.collected) continue;
    if(c.z>playerZ+0.06||c.z<playerZ-0.06) continue;
    if(c.lane!==pLane) continue;
    c.collected=true;
    coins++;score+=50;
    sfxCoin();
    var cy=zToY(c.z),cx=laneX(c.lane,c.z);
    spawnParticles(cx,cy-15,'#ffc107',6);
  }
}

function crash(){
  sfxCrash();
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  gameOver=true;

  var fs=Math.floor(score);
  if(fs>highScore){highScore=fs;localStorage.setItem('bb_surfer_hi',highScore.toString());}

  // Crash particles at player position
  var px=player.laneX;
  var py=zToY(0.15)+player.y-25;
  spawnParticles(px,py,'#297ff0',15);
  spawnParticles(px,py,'#ff5a4d',10);

  // Show end screen after a short visible delay (game keeps rendering via gameLoop)
  setTimeout(function(){
    running=false;
    C.style.pointerEvents='none';
    document.getElementById('finalScore').textContent=fs;
    document.getElementById('highDisp').textContent='BEST: '+highScore;
    document.getElementById('statsDisp').textContent=coins+' coins | '+Math.floor(distance)+'m';
    endScreen.classList.remove('hidden');
  },800);

  // Crash particles
  var pz=0.08;
  var px=laneX(player.lane,pz);
  var py=zToY(pz)+player.y;
  spawnParticles(px,py-20,'#297ff0',15);
  spawnParticles(px,py-20,'#ff5a4d',10);
}

// ─── GAME LOOP ────────────────────────────────────
function gameLoop(){
  if(!running) return;
  frameCount++;

  X.clearRect(0,0,C.width,C.height);
  drawSky();
  drawRoad();

  if(!gameOver){
    // Speed ramp — gets harder forever
    speed=Math.min(MAX_SPEED,BASE_SPEED+distance*0.002);
    distance+=speed*0.05;
    score+=speed*0.1;
    // Tighten spawn gap as distance increases (never below 14 so patterns are survivable)
    SPAWN_GAP=Math.max(14,25-distance*0.005);

    // Player physics
    if(player.jumping){
      player.vy+=GRAVITY;
      player.y+=player.vy;
      if(player.y>=0){player.y=0;player.vy=0;player.jumping=false;}
    }
    if(player.sliding){
      player.slideTimer--;
      if(player.slideTimer<=0) player.sliding=false;
    }
    if(player.invincible>0) player.invincible--;

    // Move camera forward (player runs toward obstacles) — cap step to prevent skipping
    camZ+=Math.min(speed*0.004,0.03);
    // Compute screen z for each obstacle/coin and remove passed ones
    for(var i=obstacles.length-1;i>=0;i--){
      obstacles[i].z=obstacles[i].wz-camZ;
      if(obstacles[i].z<-0.1) obstacles.splice(i,1);
    }
    for(var i=coinItems.length-1;i>=0;i--){
      coinItems[i].z=coinItems[i].wz-camZ;
      if(coinItems[i].z<-0.1) coinItems.splice(i,1);
    }

    // Spawn
    lastSpawnDist+=speed*0.05;
    if(lastSpawnDist>SPAWN_GAP){
      lastSpawnDist=0;
      spawnRow();
      // Compute z for newly spawned items immediately
      for(var i=0;i<obstacles.length;i++) obstacles[i].z=obstacles[i].wz-camZ;
      for(var i=0;i<coinItems.length;i++) coinItems[i].z=coinItems[i].wz-camZ;
    }

    checkCollisions();
  }

  // Draw objects back to front
  var allItems=[];
  for(var i=0;i<obstacles.length;i++) allItems.push({z:obstacles[i].z,type:'obs',idx:i});
  for(var i=0;i<coinItems.length;i++){
    if(!coinItems[i].collected) allItems.push({z:coinItems[i].z,type:'coin',idx:i});
  }
  allItems.sort(function(a,b){return b.z-a.z;});

  var playerDrawn=false;
  for(var i=0;i<allItems.length;i++){
    // Draw player at correct depth
    if(!playerDrawn&&allItems[i].z<0.15){
      drawPlayer();playerDrawn=true;
    }
    if(allItems[i].type==='obs') drawObstacle(obstacles[allItems[i].idx]);
    else drawCoin(coinItems[allItems[i].idx]);
  }
  if(!playerDrawn) drawPlayer();

  drawParticles();
  if(!gameOver) drawHUD();

  requestAnimationFrame(gameLoop);
}

// ─── START / END ──────────────────────────────────
C.style.pointerEvents='none';

function startGame(){
  try{
    initAudio();
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();

    score=0;coins=0;distance=0;speed=BASE_SPEED;frameCount=0;
    gameOver=false;
    obstacles=[];coinItems=[];particles=[];lastSpawnDist=0;camZ=0;
    player.lane=0;player.targetLane=0;player.y=0;player.vy=0;
    player.jumping=false;player.sliding=false;player.slideTimer=0;
    player.switchAnim=0;player.invincible=0;

    resize();setupPerspective();
    player.laneX=laneX(0,0.15);

    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    C.style.pointerEvents='auto';
    running=true;
    requestAnimationFrame(gameLoop);
  }catch(err){alert('Error: '+err.message);}
}

function bindBtn(id,fn){
  var el=document.getElementById(id);
  el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();fn();},{passive:false});
  el.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
  el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();fn();});
}
bindBtn('startBtn',startGame);
bindBtn('restartBtn',startGame);
</script>

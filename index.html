<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blue Billboard - Street Surfer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;overflow:hidden;background:#000;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;}
#arCamera{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#arCamera.hidden{display:none;}
.ar-fallback{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
  background:linear-gradient(135deg,#000510 0%,#001030 50%,#002060 100%);}
.ar-fallback.hidden{display:none;}
canvas{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:1;}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(0,10,30,0.95);color:#fff;text-align:center;padding:24px;}
.overlay.hidden{display:none;}
.overlay .logo-img{width:220px;margin-bottom:24px;}
.overlay h1{font-size:38px;text-transform:uppercase;letter-spacing:4px;margin-bottom:8px;color:#2ea3f2;
  text-shadow:0 0 25px rgba(46,163,242,0.5);}
.overlay h2{font-size:18px;font-weight:400;margin-bottom:24px;color:#d9d9d9;line-height:1.5;}
.overlay .final-score{font-size:88px;font-weight:900;color:#2ea3f2;margin:10px 0;
  text-shadow:0 0 40px rgba(46,163,242,0.6);}
.overlay .final-label{font-size:17px;color:#d9d9d9;text-transform:uppercase;letter-spacing:3px;}
.overlay .stats{font-size:16px;color:#2ea3f2;margin-top:6px;}
.overlay .high{font-size:17px;color:#ffdd00;margin-top:6px;}
.btn{display:inline-block;padding:18px 56px;font-size:20px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:#fff;background:#003d7a;
  border:2px solid #2ea3f2;border-radius:50px;cursor:pointer;margin-top:20px;
  box-shadow:0 0 15px rgba(46,163,242,0.3);}
.btn:active{background:#2ea3f2;box-shadow:0 0 25px rgba(46,163,242,0.6);}
.powered-by{position:fixed;bottom:4px;left:0;right:0;text-align:center;
  font-size:10px;color:rgba(46,163,242,0.3);letter-spacing:1px;
  text-transform:uppercase;z-index:5;pointer-events:none;}
</style>
</head>
<body>

<video id="arCamera" autoplay playsinline muted></video>
<div class="ar-fallback hidden" id="arFallback"></div>
<canvas id="game"></canvas>

<div class="overlay" id="startScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1>Street Surfer</h1>
  <h2>Swipe left/right to switch lanes<br>Swipe up to jump, down to slide<br>Dodge obstacles and collect data!</h2>
  <button class="btn" id="startBtn">Run!</button>
</div>

<div class="overlay hidden" id="endScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1 id="endTitle">System Crash!</h1>
  <div class="final-label">Score</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="high" id="highDisp"></div>
  <div class="stats" id="statsDisp"></div>
  <button class="btn" id="restartBtn">Reboot!</button>
</div>

<div class="powered-by">Powered by Blue Billboard</div>

<script>
// ─── AUDIO ────────────────────────────────────────
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function snd(f,t,d,v){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.06;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(d||0.1));
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+(d||0.1));}catch(e){}}
function playSweep(s,e,t,d,v){if(!audioCtx)return;try{var n=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t||'sawtooth';o.frequency.setValueAtTime(s,n);o.frequency.exponentialRampToValueAtTime(e,n+d);
  g.gain.setValueAtTime(v||0.06,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+d);}catch(e){}}
function sfxCoin(){snd(1200,'sine',0.06,0.07);setTimeout(function(){snd(1800,'sine',0.06,0.05);},40);}
function sfxJump(){playSweep(200,600,'sine',0.15,0.06);}
function sfxSlide(){playSweep(400,100,'sawtooth',0.12,0.04);}
function sfxCrash(){playSweep(300,40,'sawtooth',0.4,0.1);snd(80,'square',0.3,0.08);}
function sfxSwitch(){snd(600,'sine',0.04,0.04);snd(800,'sine',0.03,0.03);}

// ─── AR CAMERA ───────────────────────────────────
var arCamera=document.getElementById('arCamera');
var arFallback=document.getElementById('arFallback');
var arReady=false;
function initCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
  .then(function(stream){arCamera.srcObject=stream;arReady=true;})
  .catch(function(){arCamera.classList.add('hidden');arFallback.classList.remove('hidden');});
}

// ─── CANVAS ───────────────────────────────────────
var C=document.getElementById('game');
var X=C.getContext('2d');
var isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
function resize(){C.width=window.innerWidth;C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ─── GAME CONFIG ──────────────────────────────────
var LANES=[-1,0,1];
var LANE_W;          // set dynamically based on screen width
var BASE_SPEED=6;
var MAX_SPEED=26;
var GRAVITY=0.8;
var JUMP_FORCE=-14;
var GROUND_Y_PCT=0.85; // road goes further down the screen

var VP_Y,VP_X,ROAD_TOP,ROAD_BOT;

function setupPerspective(){
  VP_X=C.width/2;
  VP_Y=C.height*0.30;
  ROAD_TOP=VP_Y+10;
  ROAD_BOT=C.height*GROUND_Y_PCT;
  LANE_W=C.width*0.28; // lanes are 28% of screen width — fills the screen
}

// All three use the same perspective division so everything looks consistent
function perspT(z){ return 1/(1+z*2.5); }
function zToY(z){ var p=perspT(z); return VP_Y+(ROAD_BOT-VP_Y)*p; }
function scaleAt(z){ return Math.max(0,perspT(z)); }
function laneX(lane,z){ return VP_X+lane*LANE_W*perspT(z); }

// Neon glow helper
function neonGlow(color,blur,fn){
  var b=isMobile?Math.floor(blur/2):blur;
  X.shadowColor=color;X.shadowBlur=b;
  fn();
  X.shadowColor='transparent';X.shadowBlur=0;
}

// ─── STATE ────────────────────────────────────────
var running=false,gameOver=false;
var score=0,coins=0,distance=0;
var highScore=parseInt(localStorage.getItem('bb_surfer_hi')||'0');
var speed=BASE_SPEED;
var frameCount=0;
var screenFlash=0;

var player={lane:0,targetLane:0,laneX:0,y:0,vy:0,jumping:false,sliding:false,slideTimer:0,
  switchAnim:0,invincible:0,trail:[]};

var obstacles=[];
var coinItems=[];
var particles=[];
var lastSpawnDist=0;
var SPAWN_GAP=18;
var camZ=0;

var swipeX=0,swipeY=0,swiping=false;

var startScreen=document.getElementById('startScreen');
var endScreen=document.getElementById('endScreen');

// ─── OBSTACLE TYPES ──────────────────────────────
function spawnRow(){
  var diff=Math.min(distance/300,1);
  var r=Math.random();

  if(r<0.08){
    // Single obstacle — easy breather
    var lane=LANES[Math.floor(Math.random()*3)];
    var type=Math.random()<0.5?'billboard':'barrier';
    obstacles.push({lane:lane,wz:camZ+3.0,type:type,hit:false});
  } else if(r<0.16){
    // Single van
    var lane=LANES[Math.floor(Math.random()*3)];
    obstacles.push({lane:lane,wz:camZ+3.0,type:'van',hit:false});
  } else if(r<0.26){
    // Electric wall — must dodge
    var lane=LANES[Math.floor(Math.random()*3)];
    obstacles.push({lane:lane,wz:camZ+3.0,type:'wall',hit:false});
  } else if(r<0.38+diff*0.08){
    // Wall + obstacle — only 1 safe lane
    var lanes=[0,1,2];
    var l1=lanes.splice(Math.floor(Math.random()*3),1)[0];
    var l2=lanes[Math.floor(Math.random()*2)];
    obstacles.push({lane:LANES[l1],wz:camZ+3.0,type:'wall',hit:false});
    obstacles.push({lane:LANES[l2],wz:camZ+3.0,type:Math.random()<0.5?'van':'billboard',hit:false});
  } else if(r<0.52+diff*0.1){
    // Two obstacles — different types
    var lanes=[0,1,2];
    var l1=lanes.splice(Math.floor(Math.random()*3),1)[0];
    var l2=lanes[Math.floor(Math.random()*2)];
    obstacles.push({lane:LANES[l1],wz:camZ+3.0,type:Math.random()<0.5?'billboard':'van',hit:false});
    obstacles.push({lane:LANES[l2],wz:camZ+3.02,type:Math.random()<0.5?'barrier':'billboard',hit:false});
  } else if(r<0.65+diff*0.15){
    // Two vans — only 1 lane free
    var freeLane=Math.floor(Math.random()*3);
    for(var i=0;i<3;i++){
      if(i!==freeLane) obstacles.push({lane:LANES[i],wz:camZ+3.0,type:'van',hit:false});
    }
  } else if(r<0.76+diff*0.1){
    // Staggered gauntlet — obstacles in quick succession across lanes
    var l1=Math.floor(Math.random()*3);
    var l2=(l1+1+Math.floor(Math.random()*2))%3;
    obstacles.push({lane:LANES[l1],wz:camZ+3.0,type:'wall',hit:false});
    obstacles.push({lane:LANES[l2],wz:camZ+3.08,type:Math.random()<0.5?'barrier':'van',hit:false});
  } else if(r<0.84+diff*0.05){
    // Billboard + barrier combo with coin reward
    var lanes=[0,1,2];
    var l1=lanes.splice(Math.floor(Math.random()*3),1)[0];
    var l2=lanes[Math.floor(Math.random()*2)];
    obstacles.push({lane:LANES[l1],wz:camZ+3.0,type:'billboard',hit:false});
    obstacles.push({lane:LANES[l2],wz:camZ+3.0,type:'barrier',hit:false});
    var l3;
    for(var i=0;i<3;i++){if(i!==l1&&i!==l2){l3=i;break;}}
    coinItems.push({lane:LANES[l3],wz:camZ+3.0,collected:false});
  } else {
    var lane=LANES[Math.floor(Math.random()*3)];
    for(var i=0;i<3;i++){
      coinItems.push({lane:lane,wz:camZ+3.0+i*0.04,collected:false});
    }
  }
}

// ─── INPUT ────────────────────────────────────────
function onStart(x,y){swiping=true;swipeX=x;swipeY=y;}
function onEnd(x,y){
  if(!swiping)return;swiping=false;
  var dx=x-swipeX,dy=y-swipeY;
  var adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx<15&&ady<15)return;
  if(adx>ady){
    if(dx<-25) moveLeft();
    else if(dx>25) moveRight();
  } else {
    if(dy<-25) jump();
    else if(dy>25) slide();
  }
}

C.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];onStart(t.clientX,t.clientY);},{passive:false});
C.addEventListener('touchend',function(e){e.preventDefault();var t=e.changedTouches[0];onEnd(t.clientX,t.clientY);},{passive:false});
C.addEventListener('mousedown',function(e){onStart(e.clientX,e.clientY);});
C.addEventListener('mouseup',function(e){onEnd(e.clientX,e.clientY);});
document.addEventListener('keydown',function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA') moveLeft();
  if(e.code==='ArrowRight'||e.code==='KeyD') moveRight();
  if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space') jump();
  if(e.code==='ArrowDown'||e.code==='KeyS') slide();
});

function moveLeft(){
  if(player.targetLane>-1){player.targetLane--;player.switchAnim=8;sfxSwitch();}
}
function moveRight(){
  if(player.targetLane<1){player.targetLane++;player.switchAnim=8;sfxSwitch();}
}
function jump(){
  if(!player.jumping&&!player.sliding){
    player.vy=JUMP_FORCE;player.jumping=true;sfxJump();
  }
}
function slide(){
  if(!player.jumping&&!player.sliding){
    player.sliding=true;player.slideTimer=18;sfxSlide();
  }
}

// ─── DRAW ─────────────────────────────────────────

function drawSky(){
  // Draw original background — visible but camera peeks through
  X.globalAlpha=0.55;

  // Sky gradient — fills top half
  var grad=X.createLinearGradient(0,0,0,C.height*0.5);
  grad.addColorStop(0,'#000510');
  grad.addColorStop(0.5,'#001030');
  grad.addColorStop(1,'#002060');
  X.fillStyle=grad;
  X.fillRect(0,0,C.width,C.height*0.5);

  // Stars
  X.globalAlpha=0.7;
  for(var i=0;i<50;i++){
    var sx=((i*137+53)%C.width);
    var sy=((i*97+17)%(C.height*0.3));
    var sb=0.3+Math.sin(frameCount*0.03+i)*0.25;
    X.fillStyle='rgba(200,220,255,'+sb+')';
    X.fillRect(sx,sy,2.5,2.5);
  }

  // ── CITY SKYLINE — realistic varied buildings ──
  setupPerspective();
  var skyBase=VP_Y+20;

  X.globalAlpha=0.55;

  // Pre-defined building layout — varied widths and heights, no gaps
  var buildings=[
    {w:0.04,h:75},{w:0.06,h:135},{w:0.03,h:60},{w:0.07,h:195},{w:0.05,h:105},
    {w:0.08,h:240},{w:0.04,h:82},{w:0.06,h:165},{w:0.03,h:68},{w:0.05,h:128},
    {w:0.07,h:218},{w:0.04,h:90},{w:0.06,h:150},{w:0.08,h:255},{w:0.05,h:112},
    {w:0.03,h:75},{w:0.07,h:180},{w:0.04,h:98},{w:0.06,h:142},{w:0.05,h:120}
  ];
  var bx=0;
  for(var i=0;i<buildings.length;i++){
    var bw2=buildings[i].w*C.width;
    var bh=buildings[i].h;
    var shade=8+((i*17)%8);

    // Building body — flush, no gaps
    X.fillStyle='rgb('+shade+','+(shade+8)+','+(shade+20)+')';
    X.fillRect(bx,skyBase-bh,bw2,bh+30);

    // Subtle edge line between buildings
    X.fillStyle='rgba(20,30,50,0.8)';
    X.fillRect(bx+bw2-1,skyBase-bh,1,bh+30);

    // Rooftop neon — only on tall buildings
    if(bh>80){
      X.globalAlpha=0.8;
      X.fillStyle='rgba(46,163,242,0.6)';
      X.fillRect(bx,skyBase-bh,bw2,3);
      X.globalAlpha=0.55;
    }

    // Windows
    X.globalAlpha=0.8;
    for(var wy=skyBase-bh+12;wy<skyBase-5;wy+=12){
      for(var wx=bx+4;wx<bx+bw2-4;wx+=9){
        var ws=((Math.floor(wx)*31+Math.floor(wy)*17+i*7)&0xFF);
        if(ws>110){
          X.fillStyle=ws>210?'rgba(46,163,242,0.5)':
                     ws>170?'rgba(0,255,255,0.3)':
                     ws>140?'rgba(255,221,0,0.25)':
                     'rgba(0,255,102,0.2)';
          X.fillRect(wx,wy,5,6);
        }
      }
    }
    X.globalAlpha=0.55;
    bx+=bw2;
  }

  // Horizon glow
  X.globalAlpha=0.6;
  X.fillStyle='rgba(46,163,242,0.15)';
  X.fillRect(0,skyBase-5,C.width,20);

  X.globalAlpha=1;
}

function drawRoad(){
  setupPerspective();

  // Road surface — semi-transparent so camera shows through
  var roadEdgeL=laneX(-1.5,0)-30;
  var roadEdgeR=laneX(1.5,0)+30;
  X.fillStyle='rgba(10,10,30,0.55)';
  X.beginPath();
  X.moveTo(VP_X-5,VP_Y);
  X.lineTo(roadEdgeL,ROAD_BOT+20);
  X.lineTo(roadEdgeR,ROAD_BOT+20);
  X.lineTo(VP_X+5,VP_Y);
  X.closePath();
  X.fill();

  // Road surface gradient overlay
  var roadGrad=X.createLinearGradient(0,ROAD_TOP,0,ROAD_BOT);
  roadGrad.addColorStop(0,'rgba(0,30,80,0.12)');
  roadGrad.addColorStop(1,'rgba(0,30,80,0.25)');
  X.fillStyle=roadGrad;
  X.fill();

  // Scrolling grid lines on road surface
  var gridScroll=(camZ*400)%30;
  for(var z=0;z<4;z+=0.05){
    var y=zToY(z);
    var s=scaleAt(z);
    var segZ=((z*400+gridScroll)%30)/30;
    if(segZ>0.1) continue;
    var lxL=laneX(-1.5,z)-10*s;
    var lxR=laneX(1.5,z)+10*s;
    X.fillStyle='rgba(46,163,242,0.12)';
    X.fillRect(lxL,y,lxR-lxL,1);
  }

  // Lane lines — neon dashed, scrolling
  var lineScroll=(camZ*500)%40;
  for(var z=0;z<4;z+=0.03){
    var y=zToY(z);
    var s=scaleAt(z);
    var segZ=((z*500+lineScroll)%40)/40;
    if(segZ>0.5) continue;

    var w=2*s;
    var alpha=Math.min(0.5,0.15+s*0.4);
    // Left lane divider
    var lx1=laneX(-0.5,z);
    X.fillStyle='rgba(46,163,242,'+alpha+')';
    X.fillRect(lx1-w/2,y,w,2);
    // Right lane divider
    var lx2=laneX(0.5,z);
    X.fillRect(lx2-w/2,y,w,2);
  }

  // Road edges — neon glow lines
  var edgeScroll=(camZ*300)%20;
  for(var z=0;z<4;z+=0.02){
    var y=zToY(z);
    var s=scaleAt(z);
    var lxL=laneX(-1.5,z)-12*s;
    var lxR=laneX(1.5,z)+12*s;
    var edgeSeg=((z*300+edgeScroll)%20)/20;
    var ea=edgeSeg<0.7?(0.4*s):0;
    // Left edge — BB blue
    X.fillStyle='rgba(46,163,242,'+ea+')';
    X.fillRect(lxL,y,3*s,2);
    // Right edge — cyan
    X.fillStyle='rgba(0,255,255,'+ea*0.6+')';
    X.fillRect(lxR,y,3*s,2);
  }

  // Sidewalk/ground beyond road edges — semi-transparent
  X.fillStyle='rgba(8,8,26,0.45)';
  X.fillRect(0,ROAD_BOT,C.width,C.height-ROAD_BOT);

  // ── SIDE SCENERY — big, bright, scrolling toward you ──
  var scenerySpacing=0.4;
  var firstWorldZ=Math.floor(camZ/scenerySpacing)*scenerySpacing;

  for(var si=0;si<12;si++){
    var worldZ=firstWorldZ+si*scenerySpacing;
    var sz=worldZ-camZ;
    if(sz<-0.1||sz>4) continue;
    var sy=zToY(sz);
    var ss=scaleAt(sz);
    if(ss<0.04) continue;
    // Fade in from distance — fully visible below z=1.5, fades from 1.5 to 3.0
    var fadeIn2=sz>1.5?Math.max(0,1-(sz-1.5)/1.5):1;
    X.globalAlpha=fadeIn2;
    var sa=Math.min(1,ss*3+0.4);
    var bs=Math.max(ss,0.2);

    var leftX=laneX(-1.5,sz)-15*bs;
    var rightX=laneX(1.5,sz)+15*bs;

    var seed=Math.abs(Math.floor(worldZ*1000)*7+13)%5;

    if(seed===0){
      // Tall lamp post
      var lh=Math.max(45,120*bs);
      var pw=Math.max(4,6*bs);
      X.fillStyle='rgba(130,150,170,'+sa+')';
      X.fillRect(leftX,sy-lh,pw,lh);
      X.fillRect(rightX,sy-lh,pw,lh);
      // Lamp arm
      X.fillRect(leftX,sy-lh,Math.max(12,22*bs),pw);
      X.fillRect(rightX-Math.max(8,18*bs),sy-lh,Math.max(12,22*bs),pw);
      // Bright lamp glow
      neonGlow('#ffdd00',14,function(){
        X.fillStyle='rgba(255,221,0,'+sa+')';
        var lr=Math.max(8,12*bs);
        X.beginPath();X.arc(leftX+Math.max(12,22*bs),sy-lh,lr,0,Math.PI*2);X.fill();
        X.beginPath();X.arc(rightX-Math.max(8,18*bs),sy-lh,lr,0,Math.PI*2);X.fill();
      });
      // Light pool on ground
      X.fillStyle='rgba(255,221,0,'+sa*0.1+')';
      X.beginPath();X.ellipse(leftX+15*bs,sy,Math.max(15,30*bs),Math.max(5,8*bs),0,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(rightX-8*bs,sy,Math.max(15,30*bs),Math.max(5,8*bs),0,0,Math.PI*2);X.fill();
    }
    else if(seed===1){
      // Big neon billboard sign
      var sw=Math.max(38,75*bs),sh=Math.max(22,45*bs);
      var postH=Math.max(30,60*bs);
      // Post
      X.fillStyle='rgba(100,110,120,'+sa+')';
      X.fillRect(leftX-sw/2,sy-postH,Math.max(4,6*bs),postH);
      X.fillRect(rightX+sw/2-Math.max(4,6*bs),sy-postH,Math.max(4,6*bs),postH);
      // Sign board
      X.fillStyle='rgba(0,20,50,'+sa+')';
      X.fillRect(leftX-sw,sy-postH-sh,sw,sh);
      X.fillRect(rightX,sy-postH-sh,sw,sh);
      // Bright neon border
      neonGlow('#2ea3f2',12,function(){
        X.strokeStyle='rgba(46,163,242,'+sa+')';
        X.lineWidth=Math.max(3,4*bs);
        X.strokeRect(leftX-sw,sy-postH-sh,sw,sh);
        X.strokeRect(rightX,sy-postH-sh,sw,sh);
      });
      // BB text on sign
      X.fillStyle='rgba(46,163,242,'+sa+')';
      X.font='bold '+Math.max(12,20*bs)+'px Courier New';
      X.textAlign='center';X.textBaseline='middle';
      X.fillText('BB',leftX-sw/2,sy-postH-sh/2);
      X.fillText('BB',rightX+sw/2,sy-postH-sh/2);
    }
    else if(seed===2){
      // Metal fence with neon top rail
      var fh=Math.max(18,38*bs);
      var fw=Math.max(30,68*bs);
      // Vertical posts
      X.fillStyle='rgba(80,90,100,'+sa+')';
      var postW=Math.max(3,5*bs);
      for(var fp=0;fp<4;fp++){
        X.fillRect(leftX-fw+fp*(fw/3),sy-fh,postW,fh);
        X.fillRect(rightX+fp*(fw/3),sy-fh,postW,fh);
      }
      // Top rail — neon
      X.fillStyle='rgba(46,163,242,'+sa*0.7+')';
      X.fillRect(leftX-fw,sy-fh,fw,Math.max(3,5*bs));
      X.fillRect(rightX,sy-fh,fw,Math.max(3,5*bs));
      // Middle rail
      X.fillRect(leftX-fw,sy-fh/2,fw,Math.max(2,3*bs));
      X.fillRect(rightX,sy-fh/2,fw,Math.max(2,3*bs));
    }
    else if(seed===3){
      // Bright traffic bollard
      var bh2=Math.max(22,45*bs);
      var bw2=Math.max(8,15*bs);
      neonGlow('#ff8800',8,function(){
        X.fillStyle='rgba(255,136,0,'+sa+')';
        X.fillRect(leftX-bw2/2,sy-bh2,bw2,bh2);
        X.fillRect(rightX-bw2/2,sy-bh2,bw2,bh2);
      });
      // White reflective stripes
      X.fillStyle='rgba(255,255,255,'+sa*0.7+')';
      X.fillRect(leftX-bw2/2,sy-bh2*0.7,bw2,Math.max(5,8*bs));
      X.fillRect(rightX-bw2/2,sy-bh2*0.7,bw2,Math.max(5,8*bs));
      X.fillRect(leftX-bw2/2,sy-bh2*0.4,bw2,Math.max(5,8*bs));
      X.fillRect(rightX-bw2/2,sy-bh2*0.4,bw2,Math.max(5,8*bs));
    }
    else {
      // Side building wall with door and windows
      var wh=Math.max(60,150*bs);
      var ww=Math.max(30,75*bs);
      // Wall
      X.fillStyle='rgba(12,22,40,'+sa*0.5+')';
      X.fillRect(leftX-ww,sy-wh,ww,wh);
      X.fillRect(rightX,sy-wh,ww,wh);
      // Rooftop neon
      X.fillStyle='rgba(46,163,242,'+sa*0.5+')';
      X.fillRect(leftX-ww,sy-wh,ww,Math.max(3,5*bs));
      X.fillRect(rightX,sy-wh,ww,Math.max(3,5*bs));
      // Windows — big and bright
      var winS=Math.max(8,15*bs);
      var winGap=Math.max(12,24*bs);
      for(var wy2=sy-wh+Math.max(9,18*bs);wy2<sy-winS;wy2+=winGap){
        for(var col=0;col<2;col++){
          var wAlpha2=((Math.floor(worldZ*100)+col*17+Math.floor(wy2))%3);
          if(wAlpha2===0){
            X.fillStyle='rgba(46,163,242,'+sa*0.5+')';
          } else if(wAlpha2===1){
            X.fillStyle='rgba(0,255,102,'+sa*0.3+')';
          } else continue;
          X.fillRect(leftX-ww+Math.max(6,12*bs)+col*winGap,wy2,winS,winS);
          X.fillRect(rightX+Math.max(6,12*bs)+col*winGap,wy2,winS,winS);
        }
      }
      // Door
      X.fillStyle='rgba(46,163,242,'+sa*0.2+')';
      var dw=Math.max(12,21*bs),dh=Math.max(18,33*bs);
      X.fillRect(leftX-ww/2-dw/2,sy-dh,dw,dh);
      X.fillRect(rightX+ww/2-dw/2,sy-dh,dw,dh);
    }
  }
  X.globalAlpha=1;
}

function drawObstacle(o){
  if(o.z===undefined||!isFinite(o.z)||o.z>4) return;
  var y=zToY(o.z);
  var s=scaleAt(o.z);
  if(s<0.04) return;
  // Fade in from distance — matches side scenery: fully visible below z=1.5, fades from 1.5 to 3.0
  var fadeIn=o.z>1.5?Math.max(0,1-(o.z-1.5)/1.5):1;
  X.globalAlpha=fadeIn;
  var ox=laneX(o.lane,o.z);

  // Bright alpha — always visible even at distance
  var a=Math.min(1,s*3+0.4);

  if(o.type==='billboard'){
    // Neon billboard sign — jump over
    var w=80*s,h=58*s;
    // Poles
    X.fillStyle='rgba(120,140,160,'+a+')';
    X.fillRect(ox-w/2+3,y-h,4*s,h);
    X.fillRect(ox+w/2-7*s,y-h,4*s,h);
    // Sign body
    X.fillStyle='rgba(0,30,80,'+a+')';
    X.fillRect(ox-w/2,y-h,w,h*0.6);
    // Bright neon border
    neonGlow('#2ea3f2',8,function(){
      X.strokeStyle='rgba(46,163,242,'+a+')';
      X.lineWidth=Math.max(3,4*s);
      X.strokeRect(ox-w/2,y-h,w,h*0.6);
    });
    // BB text
    X.fillStyle='rgba(100,200,255,'+a+')';
    X.font='bold '+Math.max(10,15*s)+'px Courier New';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('BB',ox,y-h+h*0.3);
    // Scan line
    var scanY=y-h+((frameCount*2+o.wz*100)%(h*0.6));
    X.fillStyle='rgba(46,163,242,'+a*0.3+')';
    X.fillRect(ox-w/2+1,scanY,w-2,Math.max(3,3*s));
  }
  else if(o.type==='barrier'){
    // Laser barrier — slide under
    var w=95*s,h=65*s;
    // Poles — bright red
    neonGlow('#ff3355',6,function(){
      X.fillStyle='rgba(255,51,85,'+a+')';
      X.fillRect(ox-w/2,y-h*1.5,Math.max(4,6*s),h*1.5);
      X.fillRect(ox+w/2-Math.max(4,6*s),y-h*1.5,Math.max(4,6*s),h*1.5);
    });
    // Bright laser beam across top
    neonGlow('#ff3355',12,function(){
      X.fillStyle='rgba(255,80,100,'+a+')';
      X.fillRect(ox-w/2,y-h*1.5,w,Math.max(6,7*s));
    });
    // Warning stripes
    for(var sy=y-h*1.5;sy<y;sy+=Math.max(8,12*s)){
      X.fillStyle='rgba(255,200,0,'+a*0.5+')';
      X.fillRect(ox-w/2,sy,Math.max(4,6*s),Math.max(4,6*s));
      X.fillRect(ox+w/2-Math.max(4,6*s),sy,Math.max(4,6*s),Math.max(4,6*s));
    }
  }
  else if(o.type==='van'){
    // Neon van — must dodge
    var w=88*s,h=80*s;
    // Shadow
    X.fillStyle='rgba(0,0,0,0.3)';
    X.beginPath();X.ellipse(ox,y+2,w/2,Math.max(4,8*s),0,0,Math.PI*2);X.fill();
    // Body — solid blue, always visible
    X.fillStyle='rgba(0,40,100,'+a+')';
    X.fillRect(ox-w/2,y-h,w,h);
    // Roof
    X.fillStyle='rgba(0,30,80,'+a+')';
    X.fillRect(ox-w/2+4*s,y-h-12*s,w-8*s,14*s);
    // Bright neon trim
    neonGlow('#2ea3f2',8,function(){
      X.strokeStyle='rgba(46,163,242,'+a+')';
      X.lineWidth=Math.max(3,3*s);
      X.strokeRect(ox-w/2,y-h,w,h);
    });
    // Windshield — bright cyan
    X.fillStyle='rgba(0,220,255,'+a*0.6+')';
    X.fillRect(ox-w/4,y-h+6*s,w/2,h*0.25);
    // Headlights — always bright
    neonGlow('#00ffff',10,function(){
      X.fillStyle='rgba(0,255,255,'+a+')';
      var lr=Math.max(5,6*s);
      X.beginPath();X.arc(ox-w/3,y-3*s,lr,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(ox+w/3,y-3*s,lr,0,Math.PI*2);X.fill();
    });
    // BB logo
    X.fillStyle='rgba(100,200,255,'+a+')';
    X.font='bold '+Math.max(9,12*s)+'px Courier New';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('BB',ox,y-h*0.35);
    // Wheels
    var wr=Math.max(5,7*s);
    X.fillStyle='rgba(30,30,50,'+a+')';
    X.beginPath();X.arc(ox-w/3,y,wr,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(ox+w/3,y,wr,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(46,163,242,'+a*0.5+')';X.lineWidth=Math.max(2,2*s);
    X.beginPath();X.arc(ox-w/3,y,wr,0,Math.PI*2);X.stroke();
    X.beginPath();X.arc(ox+w/3,y,wr,0,Math.PI*2);X.stroke();
  }
  else if(o.type==='wall'){
    // Tall electrified wall — can't jump over, can't slide under
    var w=90*s,h=140*s;
    // Main wall body
    var wallGrad=X.createLinearGradient(ox-w/2,y-h,ox-w/2,y);
    wallGrad.addColorStop(0,'rgba(80,0,120,'+a+')');
    wallGrad.addColorStop(0.5,'rgba(50,0,80,'+a+')');
    wallGrad.addColorStop(1,'rgba(30,0,50,'+a+')');
    X.fillStyle=wallGrad;
    X.fillRect(ox-w/2,y-h,w,h);
    // Neon border — magenta/purple
    neonGlow('#ff00ff',12,function(){
      X.strokeStyle='rgba(255,0,255,'+a+')';
      X.lineWidth=Math.max(3,4*s);
      X.strokeRect(ox-w/2,y-h,w,h);
    });
    // Horizontal electric bars
    for(var ey=y-h+15*s;ey<y-10*s;ey+=20*s){
      neonGlow('#ff00ff',8,function(){
        X.strokeStyle='rgba(255,100,255,'+a*0.8+')';
        X.lineWidth=Math.max(2,3*s);
        X.beginPath();X.moveTo(ox-w/2+4*s,ey);X.lineTo(ox+w/2-4*s,ey);X.stroke();
      });
    }
    // Electric crackling bolts — animated
    var boltSeed=Math.floor(frameCount*0.3+o.wz*100);
    for(var b=0;b<3;b++){
      var bx1=ox-w/3+((boltSeed+b*37)%Math.floor(w*0.6));
      var by1=y-h+10*s;
      X.strokeStyle='rgba(255,200,255,'+a*0.9+')';
      X.lineWidth=Math.max(1,2*s);
      X.beginPath();X.moveTo(bx1,by1);
      for(var seg=0;seg<4;seg++){
        bx1+=(Math.sin(boltSeed*0.7+seg*3+b)*8)*s;
        by1+=h*0.22;
        X.lineTo(bx1,by1);
      }
      X.stroke();
    }
    // Warning symbol — skull/danger
    X.fillStyle='rgba(255,200,0,'+a+')';
    X.font='bold '+Math.max(14,20*s)+'px Courier New';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText('⚡',ox,y-h*0.5);
    // Top hazard stripes
    var stripeW=8*s;
    for(var sx2=ox-w/2;sx2<ox+w/2;sx2+=stripeW*2){
      X.fillStyle='rgba(255,200,0,'+a*0.6+')';
      X.fillRect(sx2,y-h,stripeW,6*s);
      X.fillRect(sx2,y-6*s,stripeW,6*s);
    }
  }
  X.globalAlpha=1;
}

function drawCoin(c){
  if(c.z===undefined||!isFinite(c.z)||c.z>4) return;
  var y=zToY(c.z);
  var s=scaleAt(c.z);
  if(s<=0) return;
  // Fade in from distance — matches side scenery
  var fadeIn=c.z>1.5?Math.max(0,1-(c.z-1.5)/1.5):1;
  X.globalAlpha=fadeIn;
  var cx=laneX(c.lane,c.z);
  var r=Math.max(6,12*s);
  var bob=Math.sin(frameCount*0.12+c.wz*20)*4*s;
  var spin=Math.sin(frameCount*0.08+c.wz*10)*0.3+0.7;
  var ca=Math.min(1,s*3+0.5); // always bright

  // Big outer glow
  neonGlow('#ffdd00',18,function(){
    X.fillStyle='rgba(255,221,0,'+ca+')';
    X.beginPath();X.arc(cx,y-32*s+bob,r*spin,0,Math.PI*2);X.fill();
  });

  // Bright white core
  X.fillStyle='rgba(255,255,200,'+ca+')';
  X.beginPath();X.arc(cx,y-32*s+bob,r*0.5*spin,0,Math.PI*2);X.fill();

  // $ symbol — dark on bright
  X.fillStyle='rgba(160,100,0,'+ca+')';
  X.font='bold '+Math.max(9,12*s)+'px Courier New';
  X.textAlign='center';X.textBaseline='middle';
  X.fillText('$',cx,y-32*s+bob);
  X.globalAlpha=1;
}

function drawPlayer(){
  var z=0.15;
  var y=zToY(z);
  var s=scaleAt(z);
  var px=laneX(player.lane,z);

  // Smooth lane switching
  if(player.switchAnim>0){
    player.switchAnim--;
    var targetX=laneX(player.targetLane,z);
    player.laneX+=(targetX-player.laneX)*0.3;
    if(player.switchAnim<=0) player.lane=player.targetLane;
  } else {
    player.laneX=laneX(player.lane,z);
  }
  px=player.laneX;

  var jumpOffset=player.y;
  var ph=95*s;
  var pw=55*s;
  var py=y+jumpOffset;

  // Trail effect
  if(frameCount%2===0){
    player.trail.push({x:px,y:py,ph:ph,pw:pw,life:8});
  }
  // Draw trail
  for(var ti=player.trail.length-1;ti>=0;ti--){
    var tr=player.trail[ti];
    tr.life--;
    if(tr.life<=0){player.trail.splice(ti,1);continue;}
    X.fillStyle='rgba(46,163,242,'+(tr.life*0.02)+')';
    X.fillRect(tr.x-tr.pw/2,tr.y-tr.ph,tr.pw,tr.ph);
  }

  // Shadow
  var shadowScale=1-Math.abs(jumpOffset)/100;
  if(shadowScale>0){
    X.fillStyle='rgba(46,163,242,'+0.15*shadowScale+')';
    X.beginPath();X.ellipse(px,y+2,pw*0.7*shadowScale,5*shadowScale,0,0,Math.PI*2);X.fill();
  }

  // Invincible flash
  if(player.invincible>0&&frameCount%6<3) return;

  X.save();
  if(player.sliding){
    X.translate(px,py);
    X.scale(1.3,0.4);
    X.translate(-px,-py);
    ph*=0.4;
  }

  // Body — neon cyberpunk character
  var bx=px-pw/2,by=py-ph,bw=pw,bh=ph;
  var br=9*s;

  // Body glow
  neonGlow('#2ea3f2',8,function(){
    // Main body
    var bodyGrad=X.createLinearGradient(bx,by,bx+bw,by+bh);
    bodyGrad.addColorStop(0,'#0a3060');
    bodyGrad.addColorStop(0.5,'#1a5090');
    bodyGrad.addColorStop(1,'#0a2040');
    X.fillStyle=bodyGrad;

    X.beginPath();
    X.moveTo(bx+br,by);X.lineTo(bx+bw-br,by);
    X.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
    X.lineTo(bx+bw,by+bh-br);
    X.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
    X.lineTo(bx+br,by+bh);
    X.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
    X.lineTo(bx,by+br);
    X.quadraticCurveTo(bx,by,bx+br,by);
    X.closePath();X.fill();

    // Neon border
    X.strokeStyle='#2ea3f2';X.lineWidth=2*s;X.stroke();
  });

  // Circuit lines on body
  X.strokeStyle='rgba(46,163,242,0.2)';X.lineWidth=1;
  X.beginPath();X.moveTo(bx+bw*0.3,by+bh*0.2);X.lineTo(bx+bw*0.3,by+bh*0.8);X.stroke();
  X.beginPath();X.moveTo(bx+bw*0.7,by+bh*0.3);X.lineTo(bx+bw*0.7,by+bh*0.7);X.stroke();

  // Visor / eyes — glowing cyan
  if(!player.sliding){
    var eyeY=by+ph*0.28;
    // Visor bar
    neonGlow('#00ffff',6,function(){
      X.fillStyle='rgba(0,255,255,0.7)';
      X.fillRect(px-pw*0.35,eyeY-2*s,pw*0.7,4*s);
    });
    // Eye dots
    X.fillStyle='#fff';
    X.beginPath();X.arc(px-pw*0.18,eyeY,2*s,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(px+pw*0.18,eyeY,2*s,0,Math.PI*2);X.fill();

    // Mouth — digital
    if(player.jumping){
      X.fillStyle='rgba(0,255,255,0.5)';
      X.fillRect(px-3*s,by+ph*0.52,6*s,3*s);
    } else {
      X.fillStyle='rgba(0,255,255,0.3)';
      X.fillRect(px-4*s,by+ph*0.5,8*s,2*s);
    }
  }

  // Legs — neon running animation
  if(!player.sliding){
    var legAnim=Math.sin(frameCount*0.4)*6*s;
    X.strokeStyle='#2ea3f2';X.lineWidth=3*s;X.lineCap='round';
    // Left leg
    X.beginPath();X.moveTo(px-5*s,py);X.lineTo(px-5*s+legAnim,py+12*s);X.stroke();
    // Right leg
    X.beginPath();X.moveTo(px+5*s,py);X.lineTo(px+5*s-legAnim,py+12*s);X.stroke();
    // Neon feet
    neonGlow('#00ffff',4,function(){
      X.fillStyle='rgba(0,255,255,0.5)';
      X.beginPath();X.arc(px-5*s+legAnim,py+12*s,2*s,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(px+5*s-legAnim,py+12*s,2*s,0,Math.PI*2);X.fill();
    });
  }

  // Arms — swinging with neon glow
  if(!player.sliding){
    var armAnim=Math.sin(frameCount*0.4+Math.PI)*5*s;
    X.strokeStyle='rgba(46,163,242,0.8)';X.lineWidth=2.5*s;X.lineCap='round';
    X.beginPath();X.moveTo(px-pw/2,by+ph*0.4);X.lineTo(px-pw/2-9*s,by+ph*0.5+armAnim);X.stroke();
    X.beginPath();X.moveTo(px+pw/2,by+ph*0.4);X.lineTo(px+pw/2+9*s,by+ph*0.5-armAnim);X.stroke();
  }

  X.restore();

  // Running dust/sparks at feet — shows YOU are moving
  if(!player.jumping&&!player.sliding&&!gameOver&&frameCount%3===0){
    particles.push({x:px+(Math.random()-0.5)*10,y:y+5,
      vx:(Math.random()-0.5)*2,vy:-Math.random()*2-1,
      life:8+Math.random()*5,maxLife:13,size:1.5+Math.random(),color:'rgba(46,163,242,0.5)'});
  }

  // Speed wind streaks rushing past player (not behind — beside and ahead)
  if(speed>6&&!gameOver){
    var lineAlpha=(speed-6)/14*0.25;
    X.strokeStyle='rgba(150,200,255,'+lineAlpha+')';X.lineWidth=1;
    for(var sl=0;sl<4;sl++){
      var slx=px+(sl-1.5)*25*s+(Math.sin(frameCount*0.5+sl*2)*10);
      var sly=py-ph*0.3-sl*15+Math.sin(frameCount*0.4+sl)*8;
      var slLen=10+speed*1.5;
      // Lines rush DOWN past the player (you're running forward into them)
      X.beginPath();X.moveTo(slx,sly);X.lineTo(slx+(Math.random()-0.5)*4,sly+slLen);X.stroke();
    }
  }
}

function drawHUD(){
  // Top bar with neon styling
  X.fillStyle='rgba(0,5,20,0.7)';
  X.fillRect(0,0,C.width,75);
  // Bottom neon line
  X.fillStyle='rgba(46,163,242,0.3)';
  X.fillRect(0,73,C.width,3);

  // Score — center, large
  X.fillStyle='#fff';
  X.font='bold 36px Courier New';X.textAlign='center';
  X.fillText(Math.floor(score),C.width/2,48);

  // Coins — left with icon
  X.fillStyle='#ffdd00';
  X.font='bold 22px Courier New';X.textAlign='left';
  X.fillText('$ '+coins,16,48);

  // Distance — right
  X.fillStyle='#2ea3f2';
  X.font='16px Courier New';X.textAlign='right';
  X.fillText(Math.floor(distance)+'m',C.width-16,48);

  // Speed indicator
  var speedPct=(speed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED);
  X.fillStyle='rgba(46,163,242,0.15)';
  X.fillRect(16,64,C.width-32,4);
  X.fillStyle=speedPct>0.7?'rgba(255,51,85,0.6)':'rgba(46,163,242,0.5)';
  X.fillRect(16,64,(C.width-32)*speedPct,4);
}

function drawParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.color;
    // Square particles — digital aesthetic
    X.fillRect(p.x-p.size,p.y-p.size,p.size*2,p.size*2);
  }
  X.globalAlpha=1;
}

function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2;
    particles.push({x:x,y:y,vx:Math.cos(a)*(2+Math.random()*4),
      vy:Math.sin(a)*(2+Math.random()*4)-2,
      life:15+Math.random()*10,maxLife:25,size:2+Math.random()*3,color:color});
  }
}

// ─── COLLISION ────────────────────────────────────
function checkCollisions(){
  var pLane=player.lane;
  var playerZ=0.15;
  for(var i=0;i<obstacles.length;i++){
    var o=obstacles[i];
    if(o.hit) continue;
    if(!isFinite(o.z)) continue;
    if(o.z>playerZ+0.04||o.z<playerZ-0.06) continue;
    if(o.lane!==pLane) continue;

    if(o.type==='billboard'){
      if(player.jumping&&player.y<-20) continue;
      o.hit=true; crash(); return;
    }
    else if(o.type==='barrier'){
      if(player.sliding) continue;
      o.hit=true; crash(); return;
    }
    else if(o.type==='van'){
      if(player.jumping&&player.y<-20) continue;
      if(player.invincible>0) continue;
      o.hit=true; crash(); return;
    }
    else if(o.type==='wall'){
      // Can't jump or slide under — must dodge to another lane
      if(player.invincible>0) continue;
      o.hit=true; crash(); return;
    }
  }

  for(var i=0;i<coinItems.length;i++){
    var c=coinItems[i];
    if(c.collected) continue;
    if(c.z>playerZ+0.06||c.z<playerZ-0.06) continue;
    if(c.lane!==pLane) continue;
    c.collected=true;
    coins++;score+=50;
    sfxCoin();
    var cy=zToY(c.z),cx=laneX(c.lane,c.z);
    spawnParticles(cx,cy-15,'#ffdd00',8);
  }
}

function crash(){
  sfxCrash();
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  gameOver=true;
  screenFlash=8;

  var fs=Math.floor(score);
  if(fs>highScore){highScore=fs;localStorage.setItem('bb_surfer_hi',highScore.toString());}

  var px=player.laneX;
  var py=zToY(0.15)+player.y-25;
  spawnParticles(px,py,'#2ea3f2',20);
  spawnParticles(px,py,'#ff3355',15);
  spawnParticles(px,py,'#00ffff',10);

  if(fs>highScore-10){
    document.getElementById('endTitle').textContent='IMPRESSIVE RUN!';
  } else {
    document.getElementById('endTitle').textContent='SYSTEM CRASH!';
  }

  setTimeout(function(){
    running=false;
    C.style.pointerEvents='none';
    document.getElementById('finalScore').textContent=fs;
    document.getElementById('highDisp').textContent='BEST: '+highScore;
    document.getElementById('statsDisp').textContent=coins+' data | '+Math.floor(distance)+'m';
    endScreen.classList.remove('hidden');
  },800);
}

// ─── GAME LOOP ────────────────────────────────────
function gameLoop(){
  if(!running) return;
  frameCount++;

  X.clearRect(0,0,C.width,C.height);

  // Subtle camera bob — simulates running motion
  X.save();
  if(!gameOver&&!player.jumping){
    var bobY=Math.sin(frameCount*0.4)*1.5*(speed/MAX_SPEED);
    var bobX=Math.sin(frameCount*0.2)*0.5*(speed/MAX_SPEED);
    X.translate(bobX,bobY);
  }

  drawSky();
  drawRoad();

  if(!gameOver){
    speed=Math.min(MAX_SPEED,BASE_SPEED+distance*0.004);
    distance+=speed*0.05;
    score+=speed*0.1;
    SPAWN_GAP=Math.max(9,18-distance*0.008);

    if(player.jumping){
      player.vy+=GRAVITY;
      player.y+=player.vy;
      if(player.y>=0){player.y=0;player.vy=0;player.jumping=false;}
    }
    if(player.sliding){
      player.slideTimer--;
      if(player.slideTimer<=0) player.sliding=false;
    }
    if(player.invincible>0) player.invincible--;

    camZ+=Math.min(speed*0.004,0.03);
    for(var i=obstacles.length-1;i>=0;i--){
      obstacles[i].z=obstacles[i].wz-camZ;
      if(obstacles[i].z<-0.1) obstacles.splice(i,1);
    }
    for(var i=coinItems.length-1;i>=0;i--){
      coinItems[i].z=coinItems[i].wz-camZ;
      if(coinItems[i].z<-0.1) coinItems.splice(i,1);
    }

    lastSpawnDist+=speed*0.05;
    if(lastSpawnDist>SPAWN_GAP){
      lastSpawnDist=0;
      spawnRow();
      for(var i=0;i<obstacles.length;i++) obstacles[i].z=obstacles[i].wz-camZ;
      for(var i=0;i<coinItems.length;i++) coinItems[i].z=coinItems[i].wz-camZ;
    }

    checkCollisions();
  }

  // Draw objects back to front
  var allItems=[];
  for(var i=0;i<obstacles.length;i++) allItems.push({z:obstacles[i].z,type:'obs',idx:i});
  for(var i=0;i<coinItems.length;i++){
    if(!coinItems[i].collected) allItems.push({z:coinItems[i].z,type:'coin',idx:i});
  }
  allItems.sort(function(a,b){return b.z-a.z;});

  var playerDrawn=false;
  for(var i=0;i<allItems.length;i++){
    if(!playerDrawn&&allItems[i].z<0.15){
      drawPlayer();playerDrawn=true;
    }
    if(allItems[i].type==='obs') drawObstacle(obstacles[allItems[i].idx]);
    else drawCoin(coinItems[allItems[i].idx]);
  }
  if(!playerDrawn) drawPlayer();

  drawParticles();

  // Screen flash on crash
  if(screenFlash>0){
    X.fillStyle='rgba(255,51,85,'+(screenFlash*0.04)+')';
    X.fillRect(0,0,C.width,C.height);
    screenFlash--;
  }

  X.restore(); // end camera bob

  if(!gameOver) drawHUD();

  requestAnimationFrame(gameLoop);
}

// ─── START / END ──────────────────────────────────
C.style.pointerEvents='none';

function startGame(){
  try{
    initAudio();
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();

    score=0;coins=0;distance=0;speed=BASE_SPEED;frameCount=0;
    gameOver=false;screenFlash=0;
    obstacles=[];coinItems=[];particles=[];lastSpawnDist=0;camZ=0;
    player.lane=0;player.targetLane=0;player.y=0;player.vy=0;
    player.jumping=false;player.sliding=false;player.slideTimer=0;
    player.switchAnim=0;player.invincible=0;player.trail=[];

    resize();setupPerspective();
    player.laneX=laneX(0,0.15);

    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    C.style.pointerEvents='auto';
    running=true;
    requestAnimationFrame(gameLoop);
  }catch(err){alert('Error: '+err.message);}
}

function bindBtn(id,fn){
  var el=document.getElementById(id);
  el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();fn();},{passive:false});
  el.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
  el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();fn();});
}
bindBtn('startBtn',function(){initCamera();startGame();});
bindBtn('restartBtn',startGame);
</script>
